name: BHEL Appointment Booking Bot

on:
  workflow_dispatch:
    inputs:
      response_url:
        description: Slack response URL
        required: false
        default: ''
      triggered_by:
        description: Triggered by user
        required: false
        default: ''
      bot_mode:
        description: Bot mode (start or check)
        required: false
        default: 'start'

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 135

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run booking bot V2
        env:
          PORTAL_USERNAME:    ${{ secrets.PORTAL_USERNAME }}
          PORTAL_PASSWORD:    ${{ secrets.PORTAL_PASSWORD }}
          DOCTOR_SEARCH:      ${{ secrets.DOCTOR_SEARCH }}
          SLACK_WEBHOOK:      ${{ secrets.SLACK_WEBHOOK }}
          SLACK_RESPONSE_URL: ${{ github.event.inputs.response_url }}
          GITHUB_TOKEN:       ${{ secrets.BOT_GITHUB_TOKEN }}
          GITHUB_REPO:        ${{ github.repository }}
          DRY_RUN:            ${{ secrets.DRY_RUN }}
          BOT_MODE:           ${{ github.event.inputs.bot_mode }}
        run: python book_appointment_v2.py
