# .github/workflows/book.yml
# Triggered by Vercel when you type /book in Slack
# Runs the full booking bot in GitHub's cloud

name: BHEL Appointment Booking Bot

on:
  workflow_dispatch:
    inputs:
      response_url:
        description: "Slack response URL for sending messages back"
        required: true
      triggered_by:
        description: "Slack username who triggered the bot"
        required: false
        default: "user"

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 120        # 2 hour max (checks every 1 hr as requested)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright plyer requests python-dotenv
          playwright install chromium
          playwright install-deps chromium

      - name: Notify Slack — bot started
        run: |
          curl -s -X POST "${{ github.event.inputs.response_url }}" \
            -H "Content-Type: application/json" \
            -d '{
              "response_type": "in_channel",
              "text": ":robot_face: *Bot is live!* Opening portal and sending OTP to your phone...\nTriggered by @${{ github.event.inputs.triggered_by }}"
            }'

      - name: Run booking bot
        env:
          MOBILE:            ${{ secrets.MOBILE }}
          DOCTOR_SEARCH:     ${{ secrets.DOCTOR_SEARCH }}
          SLACK_WEBHOOK:     ${{ secrets.SLACK_WEBHOOK }}
          SLACK_RESPONSE_URL: ${{ github.event.inputs.response_url }}
          GITHUB_TOKEN:      ${{ secrets.BOT_GITHUB_TOKEN }}
          GITHUB_REPO:       ${{ github.repository }}
          DRY_RUN:           "false"
          POLL_INTERVAL:     "3600"          # check every 1 hour as requested
          MAX_WAIT_HOURS:    "2"
        run: python book_appointment.py
